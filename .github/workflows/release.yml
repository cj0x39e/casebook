name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build and Release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches app version
        run: |
          node <<'EOF'
          const fs = require('fs')

          const tag = process.env.RELEASE_TAG
          const expected = tag.replace(/^v/, '')
          const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'))
          const actual = config.version

          if (actual !== expected) {
            console.error(`Tag ${tag} does not match src-tauri/tauri.conf.json version ${actual}`)
            process.exit(1)
          }

          console.log(`Release tag ${tag} matches app version ${actual}`)
          EOF

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Casebook ${{ env.RELEASE_TAG }}
          releaseBody: See the assets to download and install this release.
          releaseDraft: false
          prerelease: false
